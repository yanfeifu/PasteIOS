name: PasteIOS
options:
  bundleIdPrefix: com.pasteios
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  PasteIOS:
    type: application
    platform: macOS
    sources:
      - path: PasteIOS
        type: group
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: "PasteIOS/Resources/Info.plist"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.pasteios.app
        CODE_SIGN_ENTITLEMENTS: "PasteIOS/Resources/PasteIOS.entitlements"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSAccessibilityUsageDescription: "PasteIOS needs accessibility access to simulate paste"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
